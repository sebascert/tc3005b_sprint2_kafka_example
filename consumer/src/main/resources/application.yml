server:
  port: 8002

spring:
  datasource:
    url: jdbc:h2:file:./data/hospital-db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: hospital-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  kafka:
    topics:
      patients: patients-topic
      appointments: appointments-topic
      status: patient-status-topic
